<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram 3:4 Carousel</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <ul>
        <li>
          <a href="1.html">carousel 1</a>
        </li>
        <li>
          <a href="2.html">carousel 2</a>
        </li>
        <li>
          <a href="3.html">carousel 3</a>
        </li>
      </ul>
    <div class="instagram-post">
      <div class="carousel-viewport" id="viewport">
        <div class="slide"><img src="images/collect/1.jpg" alt="Post 1" /></div>
        <div class="slide"><img src="images/collect/2.jpg" alt="Post 2" /></div>
        <div class="slide"><img src="images/collect/3.jpg" alt="Post 3" /></div>
        <div class="slide"><img src="images/collect/4.jpg" alt="Post 4" /></div>
        <div class="slide"><img src="images/collect/5.jpg" alt="Post 5" /></div>
        <div class="slide"><img src="images/collect/6.jpg" alt="Post 6" /></div>
        <div class="slide"><img src="images/collect/7.jpg" alt="Post 7" /></div>
        <div class="slide"><img src="images/collect/8.jpg" alt="Post 8" /></div>
        <div class="slide"><img src="images/collect/9.jpg" alt="Post 9" /></div>
        <div class="slide"><img src="images/collect/10.jpg" alt="Post 10" /></div>
        <div class="slide"><img src="images/collect/11.jpg" alt="Post 11" /></div>
        <div class="slide">
          <img src="images/collect/12.jpg" alt="Post 4" />
        </div>
      </div>

      <button class="nav-btn prev-btn" id="prevBtn" aria-label="Previous">
        ❮
      </button>
      <button class="nav-btn next-btn" id="nextBtn" aria-label="Next">❯</button>

      <div class="dots-container" id="dotsContainer"></div>
    </div>
  </body>
</html>
